<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#101722"/>
      <stop offset="45%" stop-color="#070b11"/>
      <stop offset="100%" stop-color="#020304"/>
    </radialGradient>

    <radialGradient id="mist" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#b9c7db" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#5f6d80" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="textMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f6ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9aa6b8" stop-opacity="0.78"/>
    </linearGradient>

    <linearGradient id="textDim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4cedc" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#7d8796" stop-opacity="0.6"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="microGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.035"/>
      </feComponentTransfer>
    </filter>

    <filter id="soft">
      <feGaussianBlur stdDeviation="0.9"/>
    </filter>

    <style>
      .title {
        font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-size: 28px;
        letter-spacing: 9px;
        font-weight: 700;
      }
      .body {
        font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
        font-size: 19px;
        letter-spacing: 0.2px;
        font-weight: 400;
      }
      .tiny {
        font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
        font-size: 12px;
        letter-spacing: 2.6px;
      }
      .grid {
        stroke: #d9e5ff;
        stroke-opacity: 0.07;
        stroke-width: 1;
      }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#mist)"/>
  <rect width="1600" height="900" filter="url(#noise)" opacity="0.8"/>

  <!-- technical grid -->
  <g>
    <path class="grid" d="M100 80H1500"/>
    <path class="grid" d="M100 140H1500"/>
    <path class="grid" d="M100 200H1500"/>
    <path class="grid" d="M100 260H1500"/>
    <path class="grid" d="M100 320H1500"/>
    <path class="grid" d="M100 380H1500"/>
    <path class="grid" d="M100 440H1500"/>
    <path class="grid" d="M100 500H1500"/>
    <path class="grid" d="M100 560H1500"/>
    <path class="grid" d="M100 620H1500"/>
    <path class="grid" d="M100 680H1500"/>
    <path class="grid" d="M100 740H1500"/>
    <path class="grid" d="M100 800H1500"/>
  </g>

  <g opacity="0.05">
    <path class="grid" d="M180 60V840"/>
    <path class="grid" d="M360 60V840"/>
    <path class="grid" d="M540 60V840"/>
    <path class="grid" d="M720 60V840"/>
    <path class="grid" d="M880 60V840"/>
    <path class="grid" d="M1060 60V840"/>
    <path class="grid" d="M1240 60V840"/>
    <path class="grid" d="M1420 60V840"/>
  </g>

  <!-- scope rings -->
  <g opacity="0.11" stroke="#dbe7ff" fill="none">
    <circle cx="800" cy="455" r="290" stroke-width="1.2"/>
    <circle cx="800" cy="455" r="210" stroke-width="1.2"/>
    <circle cx="800" cy="455" r="135" stroke-width="1.2"/>
  </g>

  <!-- waveform / scan trace -->
  <g opacity="0.18" stroke="#cbd8ec" stroke-width="2" fill="none" filter="url(#soft)">
    <path d="M180 610
             L260 608 L310 592 L360 615 L420 582 L480 621
             L540 600 L610 606 L680 575 L740 630 L800 590
             L860 612 L930 580 L1000 626 L1060 594 L1120 607
             L1180 585 L1250 620 L1320 602 L1420 609"/>
  </g>

  <!-- top classification bars -->
  <g opacity="0.12" stroke="#dbe7ff" stroke-width="1.5">
    <path d="M300 120H1300"/>
    <path d="M340 148H1260"/>
    <path d="M380 176H1220"/>
  </g>

  <!-- title -->
  <g filter="url(#glow)">
    <text x="800" y="155" text-anchor="middle" fill="url(#textMain)" class="title">TRANSMISSION CLOSING — ASO-DUNKELTALER-01</text>
  </g>

  <!-- precise data block -->
  <g fill="url(#textMain)" filter="url(#microGlow)">
    <text x="800" y="300" text-anchor="middle" class="body">Session duration     : 41 days, 7 hours, 33 minutes</text>
    <text x="800" y="340" text-anchor="middle" class="body">Total signals logged : 2,847</text>
    <text x="800" y="380" text-anchor="middle" class="body">Drives submitted     : 38</text>
    <text x="800" y="420" text-anchor="middle" class="body">ARIRAL reputation    : LOYAL  (+94)</text>
    <text x="800" y="460" text-anchor="middle" class="body">Highest WoW score    : 9.871</text>
    <text x="800" y="500" text-anchor="middle" class="body">Total points         : 1,847,291</text>
  </g>

  <!-- warnings -->
  <g fill="url(#textDim)" filter="url(#microGlow)">
    <text x="800" y="586" text-anchor="middle" class="body">WARNING: Signal DRV-A1F still classified.</text>
    <text x="800" y="626" text-anchor="middle" class="body">WARNING: Do not play back the void carrier.</text>
    <text x="800" y="666" text-anchor="middle" class="body">WARNING: They know you are here.</text>
  </g>

  <!-- final transmission lines -->
  <g fill="url(#textMain)" filter="url(#glow)">
    <text x="800" y="748" text-anchor="middle" class="body">The array is running.</text>
    <text x="800" y="788" text-anchor="middle" class="body">The sky is not quiet.</text>
    <text x="800" y="828" text-anchor="middle" class="body">It was never quiet.</text>
    <text x="800" y="868" text-anchor="middle" class="body">[ END TRANSMISSION ]   ▋</text>
  </g>

  <!-- edge markers -->
  <g opacity="0.13" stroke="#dbe7ff" stroke-width="1.4" fill="none">
    <path d="M120 120H200V190"/>
    <path d="M1480 120H1400V190"/>
    <path d="M120 780H200V710"/>
    <path d="M1480 780H1400V710"/>
  </g>

  <!-- subtle chromatic ghosting -->
  <g opacity="0.07" filter="url(#soft)">
    <text x="802" y="155" text-anchor="middle" fill="#89a3ff" class="title">TRANSMISSION CLOSING — ASO-DUNKELTALER-01</text>
    <text x="798" y="155" text-anchor="middle" fill="#ffffff" class="title">TRANSMISSION CLOSING — ASO-DUNKELTALER-01</text>
  </g>
</svg>
